<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{product/_layout}">
<head><title>Xác nhận đơn hàng</title></head>
<body>
<div layout:fragment="content">
    <h3 class="mb-4">
        <i class="bi bi-cart-check"></i> Xác nhận đơn hàng
    </h3>
    <hr>

    <div th:if="${selectedProduct != null}" class="row">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <img th:src="${selectedProduct.image}" class="card-img-top"
                     th:if="${selectedProduct.image != null}"
                     style="height: 300px; object-fit: cover;">
                <div th:unless="${selectedProduct.image != null}"
                     class="card-img-top bg-light d-flex align-items-center justify-content-center"
                     style="height: 300px;">
                    <i class="bi bi-image text-muted" style="font-size: 5rem;"></i>
                </div>
                <div class="card-body">
                    <h5 class="card-title" th:text="${selectedProduct.name}"></h5>
                    <p class="card-text">
                        <span class="text-danger fw-bold fs-4">
                            <i class="bi bi-currency-dollar"></i>
                            <span th:text="${#numbers.formatDecimal(selectedProduct.price, 0, 'COMMA', 0, 'POINT')}"></span> VNĐ
                        </span>
                    </p>
                    <p class="card-text">
                        <small class="text-muted">
                            <i class="bi bi-tag"></i>
                            Danh mục: <span th:text="${selectedProduct.category.name}"></span>
                        </small>
                    </p>
                </div>
            </div>
        </div>

        <div class="col-md-7">
            <div class="card shadow-sm">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0"><i class="bi bi-pencil-square"></i> Thông tin giao hàng</h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/order/submit}" method="post">
                        <input type="hidden" name="productId" th:value="${selectedProduct.id}">

                        <div class="mb-3">
                            <label class="form-label fw-bold">Người đặt hàng:</label>
                            <input type="text" class="form-control"
                                   th:value="${#authentication.name}" readonly disabled>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Ghi chú giao hàng:</label>
                            <textarea class="form-control" name="notes" rows="4"
                                      placeholder="Nhập địa chỉ giao hàng, số điện thoại liên hệ và các ghi chú khác..."
                                      required></textarea>
                            <div class="invalid-feedback">Vui lòng nhập thông tin giao hàng</div>
                        </div>

                        <div class="alert alert-info">
                            <i class="bi bi-info-circle"></i>
                            Bạn có chắc chắn muốn đặt mua sản phẩm này?
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success btn-lg">
                                <i class="bi bi-check-circle"></i> Xác nhận đặt mua
                            </button>
                            <a th:href="@{/products}" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-left"></i> Quay lại danh sách
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div th:unless="${selectedProduct != null}" class="alert alert-warning">
        <i class="bi bi-exclamation-triangle"></i>
        Vui lòng chọn sản phẩm từ danh sách để đặt hàng.
        <div class="mt-3">
            <a th:href="@{/products}" class="btn btn-warning">
                <i class="bi bi-arrow-left"></i> Quay lại danh sách
            </a>
        </div>
    </div>
</div>
</body>
</html>
