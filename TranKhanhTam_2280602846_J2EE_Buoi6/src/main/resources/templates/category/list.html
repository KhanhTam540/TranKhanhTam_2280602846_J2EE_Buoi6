<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{product/_layout}">
<head><title>Quản lý danh mục</title></head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="mb-0">
            <i class="bi bi-tags"></i> Danh sách danh mục
        </h3>
        <a th:href="@{/categories/add}" class="btn btn-primary">
            <i class="bi bi-plus-circle"></i> Thêm danh mục
        </a>
    </div>

    <table class="table table-hover align-middle">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Tên danh mục</th>
            <th class="text-center">Thao tác</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="cat : ${categories}">
            <td th:text="${cat.id}"></td>
            <td class="fw-bold">
                <i class="bi bi-folder"></i> <span th:text="${cat.name}"></span>
            </td>
            <td class="text-center">
                <a th:href="@{/categories/edit/{id}(id=${cat.id})}"
                   class="btn btn-warning btn-sm">
                    <i class="bi bi-pencil"></i> Sửa
                </a>
                <a th:href="@{/categories/delete/{id}(id=${cat.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Xóa danh mục này?')">
                    <i class="bi bi-trash"></i> Xóa
                </a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
