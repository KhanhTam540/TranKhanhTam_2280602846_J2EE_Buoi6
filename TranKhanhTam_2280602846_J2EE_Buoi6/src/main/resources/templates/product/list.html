<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{product/_layout}">
<head>
    <title>Danh sách sản phẩm</title>
    <style>
        .product-image {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #dee2e6;
            padding: 3px;
            background: white;
        }
        .product-image-placeholder {
            width: 60px;
            height: 60px;
            background: #f8f9fa;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #adb5bd;
            border: 1px dashed #dee2e6;
        }
        .price {
            color: #28a745;
            font-weight: 600;
        }
        .category-badge {
            background-color: #e9ecef;
            color: #495057;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .btn-create {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 5px;
            font-weight: 500;
        }
        .btn-create:hover {
            background-color: #218838;
            color: white;
        }
        .table th {
            background-color: #f8f9fa;
            color: #495057;
            font-weight: 600;
            border-bottom: 2px solid #dee2e6;
        }
        .footer {
            color: #6c757d;
            font-size: 0.9rem;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #dee2e6;
            text-align: center;
        }
    </style>
</head>
<body>
<div layout:fragment="content">
    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold" style="color: #333;">Home Products</h2>
        <a th:href="@{/products/add}" class="btn btn-create" sec:authorize="hasRole('ADMIN')">
            <i class="bi bi-plus-circle me-2"></i>Create New Product
        </a>
    </div>

    <!-- Products Table -->
    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead>
            <tr>
                <th width="5%">#</th>
                <th width="25%">Name</th>
                <th width="20%">Image</th>
                <th width="15%">Price</th>
                <th width="20%">Category Name</th>
                <th width="15%" class="text-center">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="product, iterStat : ${products}">
                <!-- ID -->
                <td class="fw-bold" th:text="${iterStat.count}"></td>

                <!-- Name -->
                <td th:text="${product.name}" class="fw-500"></td>

                <!-- Image -->
                <td>
                    <div th:if="${product.image != null and !product.image.isEmpty()}">
                        <img th:src="${product.image}" alt="Product Image" class="product-image">
                    </div>
                    <div th:unless="${product.image != null and !product.image.isEmpty()}"
                         class="product-image-placeholder">
                        <i class="bi bi-image"></i>
                    </div>
                </td>

                <!-- Price -->
                <td>
                        <span class="price">
                            <span th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')}"></span>
                        </span>
                </td>

                <!-- Category -->
                <td>
                        <span class="category-badge">
                            <i class="bi bi-tag me-1"></i>
                            <span th:text="${product.category != null ? product.category.name : 'Uncategorized'}"></span>
                        </span>
                </td>

                <!-- Actions -->
                <td class="text-center">
                    <div class="btn-group" role="group">
                        <a th:href="@{/order(productId=${product.id})}"
                           class="btn btn-sm btn-outline-success me-1"
                           sec:authorize="hasRole('USER')"
                           title="Order">
                            <i class="bi bi-cart"></i>
                        </a>
                        <a th:href="@{/products/edit/{id}(id=${product.id})}"
                           class="btn btn-sm btn-outline-warning me-1"
                           sec:authorize="hasRole('ADMIN')"
                           title="Edit">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <a th:href="@{/products/delete/{id}(id=${product.id})}"
                           class="btn btn-sm btn-outline-danger"
                           sec:authorize="hasRole('ADMIN')"
                           title="Delete"
                           onclick="return confirm('Are you sure you want to delete this product?')">
                            <i class="bi bi-trash"></i>
                        </a>
                    </div>
                </td>
            </tr>

            <!-- Sample data for demonstration (will be replaced by real data) -->
            <tr th:if="${#lists.isEmpty(products)}">
                <td>1</td>
                <td>Lenovo ThinkPad T15 15.6" Laptop Intel Core i7-10610U 512GB SSD 16GB RAM FHD</td>
                <td>
                    <div class="product-image-placeholder">
                        <i class="bi bi-laptop"></i>
                    </div>
                </td>
                <td><span class="price">27000</span></td>
                <td><span class="category-badge"><i class="bi bi-tag me-1"></i>Laptop</span></td>
                <td class="text-center">
                    <div class="btn-group">
                        <button class="btn btn-sm btn-outline-success me-1" disabled><i class="bi bi-cart"></i></button>
                        <button class="btn btn-sm btn-outline-warning me-1" disabled><i class="bi bi-pencil"></i></button>
                        <button class="btn btn-sm btn-outline-danger" disabled><i class="bi bi-trash"></i></button>
                    </div>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(products)}">
                <td>2</td>
                <td>iPhone 16 Pro Max 1TB</td>
                <td>
                    <div class="product-image-placeholder">
                        <i class="bi bi-phone"></i>
                    </div>
                </td>
                <td><span class="price">41990</span></td>
                <td><span class="category-badge"><i class="bi bi-tag me-1"></i>Điện thoại</span></td>
                <td class="text-center">
                    <div class="btn-group">
                        <button class="btn btn-sm btn-outline-success me-1" disabled><i class="bi bi-cart"></i></button>
                        <button class="btn btn-sm btn-outline-warning me-1" disabled><i class="bi bi-pencil"></i></button>
                        <button class="btn btn-sm btn-outline-danger" disabled><i class="bi bi-trash"></i></button>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Footer -->
    <div class="footer">
        <p class="mb-0">© 2025 - Phát triển ứng dụng với J2EE</p>
    </div>
</div>
</body>
</html>
