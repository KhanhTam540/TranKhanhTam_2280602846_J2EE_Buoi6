<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{product/_layout}">
<head><title>Thông tin sản phẩm</title></head>
<body>
<div layout:fragment="content">
    <h3 class="mb-4" th:text="${product.id == null ? 'Thêm sản phẩm mới' : 'Cập nhật sản phẩm'}">
        <i class="bi bi-plus-circle"></i>
    </h3>

    <form th:action="@{/products/save}" th:object="${product}" method="post">
        <input type="hidden" th:field="*{id}">

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Tên sản phẩm:</label>
                <input type="text" th:field="*{name}" class="form-control" required>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Giá:</label>
                <input type="number" th:field="*{price}" class="form-control" required>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">URL Hình ảnh:</label>
                <input type="text" th:field="*{image}" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Danh mục:</label>
                <select th:field="*{category}" class="form-select" required>
                    <option value="">-- Chọn danh mục --</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat.id}"
                            th:text="${cat.name}">
                    </option>
                </select>
            </div>
        </div>

        <button type="submit" class="btn btn-success">
            <i class="bi bi-save"></i>
            <span th:text="${product.id == null ? 'Lưu sản phẩm' : 'Cập nhật'}"></span>
        </button>
        <a th:href="@{/products}" class="btn btn-secondary">
            <i class="bi bi-arrow-left"></i> Hủy
        </a>
    </form>
</div>
</body>
</html>
